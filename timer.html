<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work Timer Deluxe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/timers.css">
</head>
<body id="main" data-bs-theme="dark">
    <div class="container py-5 d-flex justify-content-center text-center">
        <div class="row g-4">
            <div class="col-md-12 col-sm-12">
                <h1>Super Super Work Timers</h1>

                <!-- 6am -->
                <h2 id="sixpercent" class="px-50">7AM SHIFT: 0%</h2>
                <div class="progress">
                    <div id="sixtimer" class="bg-info progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 25%" aria-valuenow="25" aria-valuemin="0" aria-valuemax="100"></div>
                </div>
                <!-- 6am end -->

                <!-- 6am -->
                <h2 id="sevenpercent">7AM SHIFT: 0%</h2>
                <div class="progress">
                    <div id="seventimer" class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 25%" aria-valuenow="25" aria-valuemin="0" aria-valuemax="100"></div>
                </div>
                <!-- 6am end -->
                
                <!-- 6am -->
                <h2 id="eightpercent">7AM SHIFT: 0%</h2>
                <div class="progress">
                    <div id="eighttimer" class="bg-danger progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 25%" aria-valuenow="25" aria-valuemin="0" aria-valuemax="100"></div>
                </div>
                <!-- 6am end -->
                
                <!-- 6am -->
                <h2 id="ninepercent">7AM SHIFT: 0%</h2>
                <div class="progress">
                    <div id="ninetimer" class="bg-warning progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 25%" aria-valuenow="25" aria-valuemin="0" aria-valuemax="100"></div>
                </div>
                <!-- 6am end -->
            </div>
        </div>
    </div>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="js/timer.js"></script>
</html>
