<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Port Flashcards</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body data-bs-theme="dark" class="text-center d-flex justify-content-center">
    <section class="col-md-4 d-flex justify-content-center flex-column">
        <div class="card shadow col-md-12 mt-5">
            <h2 id="main-name" class="mt-3">Test</h2>
            <p id="first-question">Test:</p>
            <input id="first-input" type="text" class="col-md-8 mx-auto">
            <p id="second-question">Transport:</p>
            <input id="second-input" type="text" class="col-md-8 mx-auto mb-4">
            <button id="submit-button" onclick="gradeQuestion()" class="btn shadow btn-secondary col-md-2 mx-auto mb-2">Submit</button>
            <h4 id="streak-text">Streak: 0</h3>
        </div>
        <br>
        <div style="display: none;" id="helper-card" class="card col-md-12 mt-3">
            <h2 id="helper-third">File Transfer Protocol</h2>
            <h5 id="helper-main">FTP</h5>
            <h5 id="helper-second">20/21</h5>
            <h5 id="helper-fourth">Transport</h5>
        </div>
        <div class="card col-md-12 mt-3">
            <h2>Info:</h2>
            <p>Anything with multiple ports needs to be formatted port/port (e.g. 20/21)</p>
    </section>

</body>
<script src="js/flashcards.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</html>
