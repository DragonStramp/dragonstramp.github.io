<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work Counter Deluxe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/counter.css">
</head>
<body id="main" data-bs-theme="dark">

<div class="container py-5">

<h1 id="title" class="text-center mb-5">Super Super Work Counters</h1>

  <div class="row g-4 d-flex justify-content-center row-cols-md-8">
<!-- Counter 1 -->
    <div class="counter-box col-md-12 col-sm-6">
      <div class="card shadow text-center p-3">
        <h2 onclick="IncreaseCounter(0)" oncontextmenu="SubtractNumber(0); return false;" id="header0" class="mb-3 smh">Counter 1: 0</h2>
        <div class="d-flex justify-content-center gap-2">
          <button class="btn btn-secondary smb" onclick="IncreaseCounter(0)">+</button>
          <button class="btn btn-secondary smb" onclick="SubtractNumber(0)">-</button>
          <button class="btn btn-secondary smb" onclick="ResetNumber(0)">Reset</button>
        </div>
      </div>
    </div>
<!-- End Counter 1 -->

<!-- Counter 2 -->
    <div class="counter-box col-md-12 col-sm-6">
      <div class="card shadow text-center p-3">
        <h2 onclick="IncreaseCounter(1)" oncontextmenu="SubtractNumber(1); return false;" id="header1" class="mb-3 smh">Counter 2: 0</h2>
        <div class="d-flex justify-content-center gap-2">
          <button class="btn btn-secondary smb" onclick="IncreaseCounter(1)">+</button>
          <button class="btn btn-secondary smb" onclick="SubtractNumber(1)">-</button>
          <button class="btn btn-secondary smb" onclick="ResetNumber(1)">Reset</button>
        </div>
      </div>
    </div>
<!-- End Counter 2 -->

<!-- Counter 3 -->
    <div class="counter-box col-md-12 col-sm-6">
      <div class="card shadow text-center p-3">
        <h2 onclick="IncreaseCounter(2)" oncontextmenu="SubtractNumber(2); return false;" id="header2" class="mb-3 smh">Counter 3: 0</h2>
        <div class="d-flex justify-content-center gap-2">
          <button class="btn btn-secondary smb" onclick="IncreaseCounter(2)">+</button>
          <button class="btn btn-secondary smb" onclick="SubtractNumber(2)">-</button>
          <button class="btn btn-secondary smb" onclick="ResetNumber(2)">Reset</button>
        </div>
      </div>
    </div>
<!-- End Counter 3 -->

<!-- Counter 4 -->
    <div class="counter-box col-md-12 col-sm-6">
      <div class="card shadow text-center p-3">
        <h2 onclick="IncreaseCounter(3)" oncontextmenu="SubtractNumber(3); return false;" id="header3" class="mb-3 smh">Counter 4: 0</h2>
        <div class="d-flex justify-content-center gap-2">
          <button class="btn btn-secondary smb" onclick="IncreaseCounter(3)">+</button>
          <button class="btn btn-secondary smb" onclick="SubtractNumber(3)">-</button>
          <button class="btn btn-secondary smb" onclick="ResetNumber(3)">Reset</button>
        </div>
      </div>
    </div>
<!-- End Counter 4 -->

<!-- Counter 5 -->
    <div class="counter-box col-md-12 col-sm-12">
      <div class="card shadow text-center p-3">
        <h2 onclick="IncreaseCounter(4)" oncontextmenu="SubtractNumber(4); return false;" id="header4" class="mb-3 smh">Counter 5: 0</h2>
        <div class="d-flex justify-content-center gap-2">
          <button class="btn btn-secondary smb" onclick="IncreaseCounter(4)">+</button>
          <button class="btn btn-secondary smb" onclick="SubtractNumber(4)">-</button>
          <button class="btn btn-secondary smb" onclick="ResetNumber(4)">Reset</button>
        </div>
      </div>
    </div>
<!-- End Counter 5 -->
 <a class="btn" data-bs-toggle="offcanvas" href="#offcanvasExample" role="button" aria-controls="offcanvasExample">Settings</a>

<!-- Timers -->

  <div class="row g-4 d-flex justify-content-center text-center">
          <div  id="timers" class="col-md-12 col-sm-12 shown">
                  <!-- 6am -->
                  <h2 id="sixpercent" class="px-50">7AM SHIFT: 0%</h2>
                  <div class="progress">
                      <div id="sixtimer" class="bg-info progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 25%" aria-valuenow="25" aria-valuemin="0" aria-valuemax="100"></div>
                  </div>
                  <!-- 6am end -->

                  <!-- 6am -->
                  <h2 id="sevenpercent">7AM SHIFT: 0%</h2>
                  <div class="progress">
                      <div id="seventimer" class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 25%" aria-valuenow="25" aria-valuemin="0" aria-valuemax="100"></div>
                  </div>
                  <!-- 6am end -->
                  
                  <!-- 6am -->
                  <h2 id="eightpercent">7AM SHIFT: 0%</h2>
                  <div class="progress">
                      <div id="eighttimer" class="bg-danger progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 25%" aria-valuenow="25" aria-valuemin="0" aria-valuemax="100"></div>
                  </div>
                  <!-- 6am end -->
                  
                  <!-- 6am -->
                  <h2 id="ninepercent">7AM SHIFT: 0%</h2>
                  <div class="progress">
                      <div id="ninetimer" class="bg-warning progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 25%" aria-valuenow="25" aria-valuemin="0" aria-valuemax="100"></div>
                  </div>
                  <!-- 6am end -->
          </div>
      </div>

<!-- Offcanvas -->
<div class="offcanvas offcanvas-start" tabindex="-1" id="offcanvasExample" aria-labelledby="offcanvasExampleLabel">
  <div class="offcanvas-header">
    <h5 class="offcanvas-title" id="offcanvasExampleLabel">Settings</h5>
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
  </div>
  <div class="offcanvas-body">
    <h2>Counter names:</h2>
    <p>Counter Name:</p>
    <input id="new-counter-name" class="form-control" type="text" placeholder="Counter Title...">
    <br>
    <p>Counter Number:</p>
    <input id="new-counter-number" class="form-control" type="number" min="1" max="5" placeholder="Counter Number...">
    <br>
    <button onclick="SetCounterName()" class="btn btn-secondary">Set Name</button>
    <hr>
    <div class="form-check form-switch">
        <input class="form-check-input" type="checkbox" role="switch" onchange="Simplify(this.checked)" id="simpleButtonsSwitch">
        <label class="form-check-label" for="simpleButtonsSwitch">Simple Buttons</label>
    </div>
    <div class="form-check form-switch">
        <input class="form-check-input" type="checkbox" role="switch" onchange="ToggleTimers(this.checked)" id="timersSwitch">
        <label class="form-check-label" for="timersSwitch">Work Timers</label>
    </div>
    <div class="form-check form-switch">
        <input class="form-check-input" type="checkbox" role="switch" onchange="ToggleTransparent(this.checked)" id="transparentSwitch">
        <label class="form-check-label" for="transparentSwitch">Transparent Cards</label>
    </div>
    <hr>
          <h3>Themes:</h3>
      <div class="form-check">
          <input class="form-check-input" type="radio" name="flexRadioDefault" id="darkModeCheck" checked>
          <label class="form-check-label" for="darkModeCheck">Dark Mode</label>
      </div>
      <div class="form-check">
          <input class="form-check-input" type="radio" name="flexRadioDefault" id="lightModeCheck">
          <label class="form-check-label" for="lightModeCheck">Light Mode</label>
      </div>
      <div class="form-check">
          <input class="form-check-input" type="radio" name="flexRadioDefault" id="pinkModeCheck">
          <label class="form-check-label" for="pinkModeCheck">Pink Mode</label>
      </div>
      <div class="form-check">
          <input class="form-check-input" type="radio" name="flexRadioDefault" id="mangoModeCheck">
          <label class="form-check-label" for="mangoModeCheck">Mango Mode</label>
      </div>
      <div class="form-check">
          <input class="form-check-input" type="radio" name="flexRadioDefault" id="synthModeCheck">
          <label class="form-check-label" for="synthModeCheck">Synthwave Mode</label>
      </div>
      <div class="form-check">
          <input class="form-check-input" type="radio" name="flexRadioDefault" id="mineModeCheck">
          <label class="form-check-label" for="mineModeCheck">Minecraft Mode</label>
      </div>
      <div class="form-check">
          <input class="form-check-input" type="radio" name="flexRadioDefault" id="dwarfModeCheck">
          <label class="form-check-label" for="dwarfModeCheck">Dwarf Fortress Mode</label>
      </div>
      <div class="form-check">
          <input class="form-check-input" type="radio" name="flexRadioDefault" id="loraxModeCheck">
          <label class="form-check-label" for="loraxModeCheck">Lorax Mode</label>
      </div>
  </div>
</div>
</body>
<script src="js/counter.js"></script>
<script src="js/timer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</html>
