<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDR Parser</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body data-bs-theme="dark" class="col-12 text-center d-flex justify-content-center">
    <section class="container">
        <h1>CDR Parser</h1>
        <div id="text-holder" class="row justify-content-center"></div>
        <div class="mx-auto mt-3 col-6 row justify-content-center">
            <button class="col-2 mx-2 btn btn-secondary" onclick="updateTextCount(-1)">-</button>
            <button class="col-6 mx-2 btn btn-secondary" onclick="analyze()">Analyze</button>
            <button class="col-2 mx-2 btn btn-secondary" onclick="updateTextCount(1)">+</button>
        </div>
        <hr>
        <button class="col-3 mx-2 btn btn-secondary" onclick="copyCallInfo()">Copy Call Info</button>
        <div id="card-holder" class="row justify-content-center g-2 mt-4"></div>
    </section>
</body>
<div id="copy"></div>
<script src="js/cdr-parser.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
</html>
