<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDR Parser</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body data-bs-theme="dark" class="col-12 text-center d-flex justify-content-center">
    <section class="container">
        <h1>CDR Parser</h1>
        <div class="row justify-content-center">
            <div class="col-12 col-md-5">
                <textarea class="form-control border-primary" placeholder="a-leg (drag and drop)" id="a-leg" rows="3"></textarea>
            </div>
             <div class="col-12 col-md-5">
                <textarea class="form-control border-info" placeholder="b-leg (drag and drop)" id="b-leg" rows="3"></textarea>
            </div>
        </div>
        <button class="col-2 col-sm-6 mx-auto mt-3 btn btn-secondary" onclick="analyze()">Analyze</button>
        <hr>
        <div class="row justify-content-center g-1 mt-4">
            <div class="col-12 col-md-4 card border-3 border border-primary shadow mx-auto mt-3">
                <h2>A-Leg</h2>
                <hr>
                <h4>Call Time</h4>
                <p id="a-call-started"></p>
                <p id="a-call-ended"></p>
                <p id="a-call-duration"></p>
                <hr>
                <h4>Call Stats</h4>
                <p id="a-media-packet-count"></p>
                <p id="a-skipped-packets"></p>
                <p id="a-skipped-percent"></p>
                <p id="a-mos"></p>
                <p id="a-quality-percent"></p>
                <p id="a-digits-dialed"></p>
                <p id="a-codec"></p>
                <hr>
                <h4>Hangup</h4>
                <a class="link-info link-offset-2 link-underline-opacity-25 link-underline-opacity-100-hover"
                    href="https://developer.signalwire.com/freeswitch/FreeSWITCH-Explained/Troubleshooting-Debugging/Hangup-Cause-Code-Table_3964945/">Freeswitch
                    Hangup Documentation</a>
                <p id="a-hangup-cause"></p>
                <p id="a-sip-hangup-disposition"></p>
                <hr>
                <h5>Major Audio Flaws:</h5>
                <ul class="mx-auto" id="a-error-list"></ul>
            </div>
            <div class="col-12 col-md-4 card shadow border-3 border border-info mx-auto mt-3">
                <h2>B-Leg</h2>
                <hr>
                <h4>Call Time</h4>
                <p id="b-call-started"></p>
                <p id="b-call-ended"></p>
                <p id="b-call-duration"></p>
                <hr>
                <h4>Call Stats</h4>
                <p id="b-media-packet-count"></p>
                <p id="b-skipped-packets"></p>
                <p id="b-skipped-percent"></p>
                <p id="b-mos"></p>
                <p id="b-quality-percent"></p>
                <p id="b-digits-dialed"></p>
                <p id="b-codec"></p>
                <hr>
                <h4>Hangup</h4>
                <a class="link-info link-offset-2 link-underline-opacity-25 link-underline-opacity-100-hover"
                    href="https://developer.signalwire.com/freeswitch/FreeSWITCH-Explained/Troubleshooting-Debugging/Hangup-Cause-Code-Table_3964945/">Freeswitch
                    Hangup Documentation</a>
                <p id="b-hangup-cause"></p>
                <p id="b-sip-hangup-disposition"></p>
                <hr>
                <h5>Major Audio Flaws:</h5>
                <ul class="mx-auto" id="b-error-list"></ul>
            </div>
        </div>
    </section>
</body>
<script src="js/cdr-parser.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>

</html>
