<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP Address Classes Flashcards</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body data-bs-theme="dark" class="text-center d-flex justify-content-center">
    <section class="col-md-4 d-flex justify-content-center flex-column">
        <div class="card shadow col-md-12 mt-5">
            <h2 id="main-name" class="mt-3">802.11a</h2>
            <hr>
                <div class="dropdown mb-3">
                    <button id="button1" class="btn btn-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                        Address Class
                    </button>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" onclick="setButton('button1', 'Class A', 0)">Class A</a></li>
                        <li><a class="dropdown-item" onclick="setButton('button1', 'Class B', 0)">Class B</a></li>
                        <li><a class="dropdown-item" onclick="setButton('button1', 'Class C', 0)">Class C</a></li>
                        <li><a class="dropdown-item" onclick="setButton('button1', 'Class D', 0)">Class D</a></li>
                        <li><a class="dropdown-item" onclick="setButton('button1', 'Class E', 0)">Class E</a></li>
                        <li><a class="dropdown-item" onclick="setButton('button1', 'Loopback', 0)">Loopback</a></li>
                        <li><a class="dropdown-item" onclick="setButton('button1', 'APIPA', 0)">APIPA</a></li>
                    </ul>
                </div>
                <hr>
            <button id="submit-button" onclick="gradeQuestion()" class="btn shadow btn-secondary col-md-2 mx-auto mb-2">Submit</button>
            <h4 id="streak-text">Streak: 0</h3>
        </div>
        <br>
        <div style="display: none;" id="helper-card" class="card col-md-12 mt-3">
            <h2 id="helper-third">File Transfer Protocol</h2>
        </div>
    </section>

</body>
<script src="js/ip-addresses.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</html>
