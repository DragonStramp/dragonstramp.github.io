<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subnet Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body data-bs-theme="dark" class="text-center d-flex justify-content-center">
    <section class="col-md-4 d-flex justify-content-center flex-column">
        <div class="card shadow col-md-12 mt-5">
            <h2 id="main-name" class="mt-3">Subnet Calculator</h2>
            <p>Address:</p>
            <input id="address" type="text" class="col-md-8 mx-auto mb-3">
            <p>CIDR:</p>
            <input id="cidr" type="text" class="col-md-8 mx-auto mb-3">
        </div>
        <br>
        <div class="card col-md-12 mt-3">
            <h4 id="subnet-address"></h4>
            <h4 id="broadcast-address"></h4>
            <h4 id="subnet-mask"></h4>
        </div>
    </section>

</body>
<script src="js/subnet-calc-page.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</html>
